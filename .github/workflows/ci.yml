# Workflow syntax reference:
# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  APP_CONSTRUCT_FOLDER_NAME: microapps-app-release
  APP_NAME: release
  APP_PACKAGE_NAME: '@pwrdrvr/microapps-app-release'
  ENV: prod
  DEPLOYER_LAMBDA_NAME: microapps-core-ghpublic-deployer-prod
  AWS_REGION: us-east-2
  CDK_CONTEXT_ARGS: "--context @pwrdrvr/microapps:tableName=microapps-core-ghpublic-prod"

jobs:
  version:
    uses: ./.github/workflows/r_version.yml
    with:
      APP_PACKAGE_NAME: '@pwrdrvr/microapps-app-release'

  build:
    needs:
      - version
    uses: ./.github/workflows/r_build-app.yml
    with:
      APP_NAME: release
      APP_PACKAGE_NAME: '@pwrdrvr/microapps-app-release'
      APP_CONSTRUCT_FOLDER_NAME: microapps-app-release
      packageVersion: ${{ needs.version.outputs.packageVersion }}
      prSuffix: ${{ needs.version.outputs.prSuffix }}

  deploy-ghpublic:
    if: github.actor != 'dependabot[bot]'
    needs:
      - version
      - build
    concurrency:
      group: deploy-app-${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.number) || github.head_ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    environment:
      name: ghpublic
      url: https://apps.ghpublic.pwrdrvr.com/${{ env.APP_NAME }}?appver=${{ needs.version.outputs.packageVersion }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/configure-nodejs

      - name: Apply package version to the workspace
        run: node scripts/set-workspace-version.mjs "${{ needs.version.outputs.packageVersion }}"

      - name: Build All TypeScript
        run: pnpm build

      - name: Download Artifact - App
        uses: actions/download-artifact@v8
        with:
          name: app_zip
          path: ${{ runner.temp }}/app-artifact

      - name: Materialize App Artifact
        run: |
          rm -rf "${RUNNER_TEMP}/app-unpacked"
          mkdir -p "${RUNNER_TEMP}/app-unpacked"
          unzip -o "${RUNNER_TEMP}/app-artifact/nextjs.zip" -d "${RUNNER_TEMP}/app-unpacked"
          rm -rf "packages/cdk-construct/lib/${APP_CONSTRUCT_FOLDER_NAME}"
          mv "${RUNNER_TEMP}/app-unpacked/${APP_CONSTRUCT_FOLDER_NAME}" "packages/cdk-construct/lib/${APP_CONSTRUCT_FOLDER_NAME}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-session-name: microapps-app-${{ env.APP_NAME }}-build
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/builder-writeRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Preflight Check Version - App
        run: |
          pnpm exec microapps-publish preflight \
            --app-name ${APP_NAME} \
            --new-version ${{ needs.version.outputs.packageVersion }} \
            --deployer-lambda-name ${DEPLOYER_LAMBDA_NAME} \
            --overwrite

      - name: Set Hotswap Flag
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            echo "HOTSWAP_FLAG=--hotswap-fallback" >> "$GITHUB_ENV"
          else
            echo "HOTSWAP_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Deploy CDK Stack - App
        run: |
          pnpm exec cdk deploy ${CDK_CONTEXT_ARGS} ${HOTSWAP_FLAG} \
            --require-approval never app

      - name: Publish to MicroApps - App
        run: |
          pnpm exec microapps-publish publish \
            --app-name ${APP_NAME} \
            --type lambda-url \
            --startup-type direct \
            --new-version ${{ needs.version.outputs.packageVersion }} \
            --deployer-lambda-name ${DEPLOYER_LAMBDA_NAME} \
            --app-lambda-name microapps-app-${APP_NAME}-${ENV}${{ needs.version.outputs.prSuffix }} \
            --static-assets-path packages/cdk-construct/lib/${APP_CONSTRUCT_FOLDER_NAME}/static_files \
            --overwrite

      - name: App URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }} \
            -X POST \
            -f state=success \
            -f context='App URL' \
            -f description='Passed' \
            -f target_url="https://apps.ghpublic.pwrdrvr.com/${{ env.APP_NAME }}?appver=${{ needs.version.outputs.packageVersion }}"

      - name: Test App
        run: |
          echo Testing App HTML Loading
          curl -H"accept: text/html" --fail https://apps.ghpublic.pwrdrvr.com/${{ env.APP_NAME }}?appver=${{ needs.version.outputs.packageVersion }}
          echo "\nTesting App API Routing"
          api_status="$(
            curl \
              -sS \
              -o /tmp/default-version-response.json \
              -w '%{http_code}' \
              -X POST \
              -H'accept: application/json' \
              -H'content-type: application/json' \
              --data '{}' \
              https://apps.ghpublic.pwrdrvr.com/${{ env.APP_NAME }}/${{ needs.version.outputs.packageVersion }}/api/default-version
          )"
          cat /tmp/default-version-response.json
          test "$api_status" = "400"
          echo "\nTesting App Manifest Loading"
          curl -H"accept: application/manifest+json" --fail https://apps.ghpublic.pwrdrvr.com/${{ env.APP_NAME }}/${{ needs.version.outputs.packageVersion }}/static/manifest.webmanifest
