# Workflow syntax reference:
# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: Release Package

on:
  release:
    types: [published]

env:
  APP_PACKAGE_NAME: '@pwrdrvr/microapps-app-release'

jobs:
  version:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'BUILD-RELEASE-DRY-RUN'))
    uses: ./.github/workflows/r_version.yml
    with:
      APP_PACKAGE_NAME: '@pwrdrvr/microapps-app-release'

  build-app:
    needs:
      - version
    uses: ./.github/workflows/r_build-app.yml
    with:
      APP_NAME: release
      APP_PACKAGE_NAME: '@pwrdrvr/microapps-app-release'
      APP_CONSTRUCT_FOLDER_NAME: microapps-app-release
      packageVersion: ${{ needs.version.outputs.packageVersion }}
      prSuffix: ${{ needs.version.outputs.prSuffix }}

  build-cdk-construct:
    name: Build CDK Construct
    needs:
      - version
      - build-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pwrdrvr/configure-nodejs@v1

      - name: Dump info from version reusable workflow
        run: |
          echo "packageVersion: ${{ needs.version.outputs.packageVersion }}"
          echo "prSuffix: ${{ needs.version.outputs.prSuffix }}"
          echo "isPrerelease: ${{ needs.version.outputs.isPrerelease }}"
          echo "releaseChannel: ${{ needs.version.outputs.releaseChannel }}"
          echo "npmDistTag: ${{ needs.version.outputs.npmDistTag }}"

      - name: Validate GitHub prerelease flag
        env:
          EXPECTED_PRERELEASE: ${{ needs.version.outputs.isPrerelease }}
          ACTUAL_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$EXPECTED_PRERELEASE" != "$ACTUAL_PRERELEASE" ]; then
            echo "Release tag prerelease state ($EXPECTED_PRERELEASE) does not match GitHub release.prerelease ($ACTUAL_PRERELEASE)." >&2
            exit 1
          fi

      - name: Apply package version to the workspace
        run: node scripts/set-workspace-version.mjs "${{ needs.version.outputs.packageVersion }}"

      - name: Check for new commits
        id: git_remote
        run: echo "latest_commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download Artifact - App
        uses: actions/download-artifact@v5
        with:
          name: app_zip
          path: packages/cdk-construct/lib/

      - name: Unzip Artifact - App
        working-directory: packages/cdk-construct/lib/
        run: unzip -o nextjs.zip

      - name: Build with JSII
        run: pnpm --filter @pwrdrvr/microapps-app-release-cdk run build:jsii-release

      - name: Upload CDK Construct Artifact
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        uses: actions/upload-artifact@v5
        with:
          name: cdk-construct-dist
          path: packages/cdk-construct/dist

  release-assets:
    name: Release Assets
    needs: [build-cdk-construct]
    runs-on: ubuntu-latest
    environment:
      name: publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Download CDK Construct build artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-construct-dist
          path: packages/cdk-construct/dist

      - name: Release CDK Construct - npmjs.org
        working-directory: packages/cdk-construct/
        run: npx -p publib@latest publib-npm
        env:
          NPM_TOKEN: ${{ secrets.NPMJSORG_PUBLISH_TOKEN }}
          NPM_DIST_TAG: ${{ needs.version.outputs.npmDistTag }}
